<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px/1.5 system-ui, sans-serif; width: 280px; margin: 16px; color: #202124; }
      h1 { font-size: 16px; margin: 0 0 12px; }
      .row { display: flex; justify-content: space-between; gap: 12px; margin: 6px 0; }
      .ok { color: #137333; }
      .bad { color: #b3261e; }
      #error { margin-top: 10px; padding: 8px; background: #fce8e6; border-radius: 6px; word-break: break-word; }
    </style>
  </head>
  <body>
    <h1>FanVPN AI Bridge</h1>
    <div class="row"><span>Native Host</span><strong id="native">检查中</strong></div>
    <div class="row"><span>协议握手</span><strong id="handshake">检查中</strong></div>
    <div class="row"><span>浏览器执行器</span><strong id="executor">-</strong></div>
    <div class="row"><span>ChatGPT 网站权限</span><strong id="site-access">检查中</strong></div>
    <div class="row"><span>版本</span><span id="version">-</span></div>
    <div id="error" hidden></div>
    <script type="module" src="src/popup.js"></script>
  </body>
</html>
